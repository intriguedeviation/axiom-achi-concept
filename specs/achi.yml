domain:
  scalars:
    - name: string
    - name: boolean
    - name: int8
    - name: int16
    - name: int32
    - name: int64
    - name: single
      remarks: Single-precision floating-point number
    - name: double
      remarks: Double-precision floating-point number
    - name: decimal
      syntax: decimal(p, s)
      remarks: Fixed-precision decimal with precision `p` and scale `s`
    - name: datetime
  types:
    - name: optionalOf
      syntax: optionalOf<T>
      where:
        - name: T
          type: any
      remarks: Defines a value of type `T` that may or may not contain a value
    - name: ref
      syntax: ref<T>
      where:
        - name: T
          type: domain.entities.*
      remarks: Defines a reference to a domain entity of `T`
    - name: predicate
      syntax: predicate<T>
      where:
        - name: T
          type: any
      remarks: Defines a boolean condition evaluated against an element of `T`
    - name: collection
      syntax: collection<T>
      where:
        - name: T
          type: any
      remarks: Defines a collection of elements of `T`
    - name: enum
      syntax: enum<T, u>
      where:
        - name: T
          type: scalar
          contains:
            - string
            - int8
            - int16
            - int32
            - int64
        - name: u
          type: string
          contains:
            - standard
            - binary
      remarks: Defines a enumeration type for standard or binary usage
    - name: regex
      syntax: regex<M>(e)
      where:
        - name: M
          type: enum<string, standard>
          contains:
            - ecma
            - pcre
      remarks: Defines a regular expression pattern using either ECMA or PCRE
    - name: pair
      syntax: pair<T>
      where:
        - name: T
          type: domain.primitives.*
      remarks: Defines a tuple pair with elements of type `T`
    - name: triplet
      syntax: triplet<T>
      where:
        - name: T
          type: domain.primitives.*
      remarks: Defines a tuple triplet with elements of type `T`
  operators:
    - name: empty
      syntax: empty(v)
      where:
        - name: v
          type: string
      returns:
        - name: success
          type: boolean
      remarks: This should return true if the string is null, empty, or contains only whitespace characters.
    - name: is
      syntax: x is y
      where:
        - name: x
          type: expression<any>
        - name: y
          type: expression<any>
      returns:
        - name: result
          type: boolean
      remarks: Determines whether expression `x` equals to `y` by identity comparison.
    - name: equals
      syntax: x equals y
      where:
        - name: x
          type: expression<any>
        - name: y
          type: expression<any>
      returns:
        - name: result
          type: boolean
      remarks: Determines whether expression `x` equals to `y` by value comparison.
    - name: countOf
      syntax: countOf(C, v)
      where:
        - name: C
          type: collection<any>
        - name: v
          type: int32
      returns:
        - name: result
          type: boolean
      remarks: Determines whether the number of elements in collection `C` equals value `v`
    - name: inclusiveFrom
      syntax: inclusiveFrom(c, v)
      where:
        - name: c
          type: collection<any>
        - name: v
          type: any
      returns:
        - name: result
          type: boolean
      remarks: Determines whether element `v` is included in `c`
    - name: anyOf
      syntax: anyOf(c, p)
      where:
        - name: c
          type: collection<any>
        - name: p
          type: predicate<boolean>
      returns:
        - name: result
          type: boolean
      remarks: Determines whether any elements of `c` meet the condition of `p`
    - name: allOf
      syntax: allOf(c, p)
      where:
        - name: c
          type: collection<any>
        - name: p
          type: predicate<boolean>
      returns:
        - name: result
          type: boolean
      remarks: Determines whether all elements of `c` meet the condition of `p`
    - name: unsetOf
      syntax: unsetOf(T, v)
      where:
        - name: T
          type: any
        - name: v
          type: any
      returns:
        - name: result
          type: boolean
      remarks: Determines whether value of `v` for type `T` is not set or provided
    - name: whereBy
      syntax: whereBy(f, op, v)
      where:
        - name: f
          type: string
        - name: op
          type: domain.operators.*
        - name: v
          type: any
      returns:
        - name: result
          type: predicate<any>
      remarks:
        Produces a predicate that evaluates whether field `f` satisfies `op`
        against value `v`
    - name: set
      syntax: set(v)
      where:
        - name: v
          type: optionalOf<any>
      returns:
        - name: result
          type: boolean
      remarks: Determines whether optional value `v` contains a value
    - name: and
      syntax: and(x, y)
      where:
      - name: x
        type: boolean
      - name: y
        type: boolean
      returns:
      - name: result
        type: boolean
      remarks: Determines whether boolean expression `x` and boolean expression `y` are true
  primitives:
    - name: playerSide
      base: enum<int8, standard>
      members:
        - name: red
          value: 0
        - name: black
          value: 1
    - name: playerLabel
      base: string
      from:
        - name: value
          type: string
      constraints:
        - empty(value) is false
        - maxLength 35
    - name: tokenPosition
      base: int8
      from:
        - name: value
          type: int8
      constraints:
        - min 0
        - max 8
    - name: boardPhase
      base: enum<int8, standard>
      members:
        - name: placement
          value: 0
        - name: movement
          value: 1
  entities:
    - name: player
      plural: players
      properties:
        - name: side
          type: domain.primitives.playerSide
          required: true
        - name: label
          type: domain.primitives.playerLabel
      rels:
        - name: tokens
          ownsMany: domain.entities.token
      rules:
        - countOf(self.tokens, 4) is true
    - name: token
      plural: tokens
      properties:
        - name: position
          type: domain.primitives.tokenPosition
          required: false
      rels:
        - name: player
          belongsTo: domain.entities.player 
    - name: grid
      plural: grids
      properties:
        - name: positions
          type: collection<domain.primitives.tokenPosition>
          required: true
        - name: phase
          type: domain.primitives.boardPhase
          required: true
        - name: activePlayer
          type: domain.primitives.playerSide
          required: true
        - name: adjacents
          type: collection<pair<domain.primitives.tokenPosition>>
        - name: victoryAlignments
          type: collection<triplet<domain.primitives.tokenPosition>>
      rels:
        - name: redPlayer
          hasOne: ref<domain.entities.player>
        - name: blackPlayer
          hasOne: ref<domain.entities.player>
        - name: placements
          ownsMany: domain.entities.placement
      rules:
        - countOf(self.positions, 9) is true
        - countOf(self.victoryAlignments, 8) is true
        - (self.redPlayer.side is domain.primitives.playerSide.red) is true
        - (self.blackPlayer.side is domain.primitives.playerSide.black) is true
    - name: placement
      plural: placements
      properties:
        - name: turn
          type: int8
          required: true
        - name: mode
          type: domain.primitives.boardPhase.placement
          required: true
      rels:
        - name: grid
          belongsTo: ref<domain.entities.grid>
        - name: player
          hasOne: ref<domain.entities.player>
        - name: token
          hasOne: ref<domain.entities.token>
      rules:
        - inclusiveFrom(self.player.tokens, self.token) is true
  behaviors:
    - name: definePlayer
      uses:
        - domain.entities.player
      context: none
      inputs:
        - name: side
          type: domain.primitives.playerSide
          required: true
        - name: label
          type: domain.primitives.playerLabel
          required: true
      returns:
        - name: player
          type: ref<domain.entities.player>
      preconditions: []
      postconditions:
        - (returns.player.side equals inputs.side) is true
        - (returns.player.label equals inputs.label) is true
      exceptions: []
    - name: startGame
      uses:
        - domain.entities.player
        - domain.entities.grid
      context: none
      inputs:
        - name: redPlayer
          type: ref<domain.entities.player>
          required: true
        - name: blackPlayer
          type: ref<domain.entities.player>
          required: true
      returns:
        - name: grid
          type: domain.entities.grid
      preconditions:
        - (inputs.redPlayer is inputs.blackPlayer) is false
      postconditions:
        - (returns.grid.self.redPlayer is inputs.redPlayer) is true
        - (returns.grid.self.blackPlayer is inputs.blackPlayer) is true
        - (returns.grid.phase is domain.primitives.boardPhase.placement) is true
      exceptions:
        - name: adversary_same_player
          condition: (inputs.redPlayer is inputs.blackPlayer) is true
    - name: placeToken
      uses:
        - domain.entities.grid
        - domain.entities.token
        - domain.entities.player
      context:
        - name: grid
          type: ref<domain.entities.grid>
      inputs:
        - name: player
          type: ref<domain.entities.player>
          required: true
        - name: token
          type: ref<domain.entities.token>
          required: true
        - name: position
          type: domain.primitives.tokenPosition
          required: true
      returns:
        - name: placement
          type: domain.entities.placement
      preconditions:
        - (context.grid.activePlayer is inputs.player.side) is true
        - anyOf(context.grid.redPlayer.tokens, whereBy(position, domain.operators.is, inputs.position)) is false
        - anyOf(context.grid.blackPlayer.tokens, whereBy(position, domain.operators.is, inputs.position)) is false
      postconditions:
        - (context.grid.activePlayer is inputs.player.side) is false
        - inclusiveFrom(context.grid.placements, returns.placement) is true
        - (inputs.token.position equals inputs.position) is true
      exceptions:
        - name: wrong_player_turn
          condition: (context.grid.activePlayer is inputs.player.side) is false
        - name: illegal_red_token_placement
          condition: anyOf(context.grid.redPlayer.tokens, whereBy(position, domain.operators.is, inputs.position)) is true
        - name: illegal_black_token_placement
          condition: anyOf(context.grid.blackPlayer.tokens, whereBy(position, domain.operators.is, inputs.position)) is true
    - name: moveToken
      uses:
        - domain.entities.grid
        - domain.entities.token
        - domain.entities.player
      context:
        - name: grid
          type: ref<domain.entities.grid>
      inputs:
        - name: player
          type: ref<domain.entities.player>
          required: true
        - name: token
          type: ref<domain.entities.token>
          required: true
        - name: position
          type: domain.primitives.tokenPosition
          required: true
      returns:
        - name: placement
          type: domain.entities.placement
      preconditions:
        - (context.grid.activePlayer is inputs.player.side) is true
        - anyOf(context.grid.redPlayer.tokens, whereBy(position, domain.operators.is, inputs.position)) is false
        - anyOf(context.grid.blackPlayer.tokens, whereBy(position, domain.operators.is, inputs.position)) is false
        - (inputs.token.position equals inputs.position) is false
        - anyOf(context.grid.adjacents, and(allOf(self, inclusiveFrom(pair, inputs.token.position), inclusiveFrom(pair, inputs.position)))) is true
      postconditions:
        - (context.grid.activePlayer is inputs.player.side) is false
        - inclusiveFrom(context.grid.placements, returns.placement) is true
        - (inputs.token.position equals inputs.position) is true
      exceptions:
        - name: wrong_player_turn
          condition: (context.grid.activePlayer is inputs.player.side) is false
        - name: illegal_red_token_movement
          condition: anyOf(context.grid.redPlayer.tokens, whereBy(position, domain.operators.is, inputs.position)) is true
        - name: illegal_black_token_movement
          condition: anyOf(context.grid.blackPlayer.tokens, whereBy(position, domain.operators.is, inputs.position)) is true
        - name: same_position_not_allowed
          condition: (inputs.token.position equals inputs.position) is true
        - name: movement_not_adjacent
          condition: anyOf(context.grid.adjacents, and(allOf(self, inclusiveFrom(pair, inputs.token.position), inclusiveFrom(pair, inputs.position)))) is false
    - name: victoryAchieved
      uses:
        - domain.entities.grid
        - domain.entities.player
        - domain.entities.token
      context:
        - name: grid
          type: ref<domain.entities.grid>
      inputs: []
      returns:
        - name: result
          type: boolean
        - name: player
          type: optionalOf<domain.entities.player>
      preconditions:
        - allOf(context.grid.redPlayer.tokens, set(position)) is true
        - allOf(context.grid.blackPlayer.tokens, set(position)) is true
      postconditions: []
      exceptions:
        - name: red_player_unset_tokens
          condition: anyOf(context.grid.redPlayer.tokens, unsetOf(domain.primitives.tokenPosition, position)) is true
        - name: black_player_unset_tokens
          condition: anyOf(context.grid.blackPlayer.tokens, unsetOf(domain.primitives.tokenPosition, position)) is true
    - name: changeGridPhase
      uses:
        - domain.entities.grid
      context:
        - name: grid
          type: ref<domain.entities.grid>
      inputs: []
      returns:
        - name: grid
          type: ref<domain.entities.grid>
      preconditions:
        - (context.grid.phase is domain.primitives.boardPhase.placement) is true
        - allOf(context.grid.redPlayer.tokens, set(position)) is true
        - allOf(context.grid.blackPlayer.tokens, set(position)) is true
      postconditions:
        - (context.grid is returns.grid) is true
        - (returns.grid.phase is domain.primitives.boardPhase.movement) is true
      exceptions:
        - name: red_player_unset_tokens
          condition: anyOf(context.grid.redPlayer.tokens, unsetOf(domain.primitives.tokenPosition, position)) is true
        - name: black_player_unset_tokens
          condition: anyOf(context.grid.blackPlayer.tokens, unsetOf(domain.primitives.tokenPosition, position)) is true
        - name: wrong_grid_phase
          condition: (context.grid.phase is domain.primitives.boardPhase.placement) is false
