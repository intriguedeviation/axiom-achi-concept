# Aspect for building the domain specification into a Rust-based WASM

llm:
  code-generation:
    rust:
      min-level: 1.95
      packaging: Crate
      manager: Cargo
      linting: Clippy
      testing:
        required: true
        style: behavior
        location: ./tests
        framework: cucumber
      conformance:
        enforce:
          - separation_of_concerns
          - open_closed_principle
          - liskov_substitution
          - inversion_of_control
          - dependency_injection
          - domain specification is the source of truth for structure and behavior
          - generated code must not contradict or extend specification semantics
        strict:
          - warnings_as_errors
        operational:
          - behavior
          - fulfillment
          - verification
    wasm:
      uses: wasm-pack
      output: ./build
  ignore:
    - .DS_Store
    - ./.github
    - ./build
    - ./target
